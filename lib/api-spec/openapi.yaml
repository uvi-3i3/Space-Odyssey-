openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: game
    description: Game operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /game/generate-event:
    post:
      operationId: generateGameEvent
      tags: [game]
      summary: Generate a narrative event
      description: Uses AI to generate a context-aware narrative event based on current game state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateEventRequest"
      responses:
        "200":
          description: Generated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedEvent"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateEventRequest:
      type: object
      properties:
        era:
          type: integer
          description: Current civilization era (1-4)
        elementsDiscovered:
          type: array
          items:
            type: string
          description: List of discovered element symbols
        buildingsBuilt:
          type: array
          items:
            type: string
          description: Names of constructed buildings
        technologiesResearched:
          type: array
          items:
            type: string
          description: Names of researched technologies
        credits:
          type: number
          description: Current credit balance
        population:
          type: integer
          description: Current population
        factionNames:
          type: array
          items:
            type: string
          description: Names of discovered alien factions
        recentEventTitle:
          type: string
          description: Title of the most recent event (for variety)
      required:
        - era
        - elementsDiscovered
        - buildingsBuilt
        - technologiesResearched
        - credits
        - population
    GeneratedEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [random, story, discovery, threat]
        choices:
          type: array
          items:
            $ref: "#/components/schemas/EventChoice"
      required:
        - id
        - title
        - description
        - type
        - choices
    EventChoice:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        consequence:
          type: string
        resourceChanges:
          type: object
          additionalProperties:
            type: number
        reputationChange:
          type: integer
      required:
        - id
        - text
        - consequence
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
